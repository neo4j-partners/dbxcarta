[project]
name = "dbxcarta-spark"
version = "1.0.0"
description = "Databricks Spark semantic-layer builder for dbxcarta"
authors = [
    { name = "Ryan Knight" },
]
requires-python = ">=3.12"
dependencies = [
    "databricks-job-runner==0.4.9",
    "databricks-sdk>=0.40",
    "neo4j>=5.0",
    "pydantic>=2",
    "pydantic-settings>=2",
    "pyspark>=3.5",
    "python-dotenv",
]

[project.optional-dependencies]
test = ["pytest"]

[project.scripts]
dbxcarta = "dbxcarta.spark.cli:main"
dbxcarta-ingest = "dbxcarta.spark.entrypoint:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "dbxcarta.spark"
