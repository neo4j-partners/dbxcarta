[project]
name = "dbxcarta-submit"
version = "1.0.0"
description = "Operator CLI for building, uploading, and submitting dbxcarta Databricks jobs"
authors = [
    { name = "Ryan Knight" },
]
requires-python = ">=3.12"
dependencies = [
    "databricks-job-runner==0.6.2",
    "dbxcarta-core",
]

[project.optional-dependencies]
test = ["pytest"]

# The operator command takes the `dbxcarta` name the deleted dbxcarta-spark
# pipeline command used to own. The distribution stays named dbxcarta-submit.
[project.scripts]
dbxcarta = "dbxcarta.submit.cli:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "dbxcarta.submit"
