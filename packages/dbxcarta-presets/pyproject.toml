[project]
name = "dbxcarta-presets"
version = "1.0.0"
description = "Operational CLI and preset protocols for dbxcarta"
authors = [
    { name = "Ryan Knight" },
]
requires-python = ">=3.12"
dependencies = [
    "databricks-job-runner>=0.4.8",
    "databricks-sdk>=0.40",
    "dbxcarta-client",
    "dbxcarta-core",
    "dbxcarta-spark",
    "neo4j>=5.0",
    "python-dotenv",
]

[project.optional-dependencies]
test = ["pytest"]

[project.scripts]
dbxcarta = "dbxcarta.presets.cli:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
dbxcarta-client = { workspace = true }
dbxcarta-core = { workspace = true }
dbxcarta-spark = { workspace = true }

[tool.uv.build-backend]
module-name = "dbxcarta.presets"
