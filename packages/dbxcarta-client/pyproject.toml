[project]
name = "dbxcarta-client"
version = "1.4.0"
description = "dbxcarta retrieval runtime and Text2SQL evaluation harness"
authors = [
    { name = "Ryan Knight" },
]
requires-python = ">=3.12"
dependencies = [
    "databricks-sdk>=0.40",
    "dbxcarta-core",
    "pydantic>=2",
    "pydantic-settings>=2",
    "requests",
]

[project.optional-dependencies]
# Graph retrieval and the Neo4j schema dump. The base install covers question
# loading, SQL parsing, and result-set comparison and does not need Neo4j.
graph = ["neo4j>=6.2.0"]
test = ["pytest"]

[project.scripts]
dbxcarta-client = "dbxcarta.client.eval.entrypoint:main"
dbxcarta-embed-probe = "dbxcarta.client.embed_probe:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

# module-name is the whole ``dbxcarta`` namespace (not just ``dbxcarta.client``)
# with namespace packaging, so a published ``dbxcarta-client`` and a published
# ``dbxcarta-core`` can coexist as namespace packages from separate
# distributions (``pip install dbxcarta-client`` resolves core as a normal
# dependency). The client is no longer a cluster entry point and is no longer
# core-bundled by ``dbxcarta publish-wheels`` (that step now builds only
# ``dbxcarta-materialize``); a normal build produces exactly today's
# ``dbxcarta/client`` contents.
[tool.uv.build-backend]
module-name = "dbxcarta"
namespace = true
