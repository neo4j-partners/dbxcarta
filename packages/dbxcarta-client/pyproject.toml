[project]
name = "dbxcarta-client"
version = "1.1.0"
description = "dbxcarta retrieval runtime and Text2SQL evaluation harness"
authors = [
    { name = "Ryan Knight" },
]
requires-python = ">=3.12"
dependencies = [
    "databricks-sdk>=0.40",
    "pydantic>=2",
    "pydantic-settings>=2",
    "requests",
]

[project.optional-dependencies]
# Graph retrieval and the Neo4j schema dump. The base install covers question
# loading, SQL parsing, and result-set comparison and does not need Neo4j.
graph = ["neo4j>=5.0"]
test = ["pytest"]

[project.scripts]
dbxcarta-client = "dbxcarta.client.eval.entrypoint:main"
dbxcarta-embed-probe = "dbxcarta.client.embed_probe:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "dbxcarta.client"
