[project]
name = "dbxcarta-client"
version = "1.0.0"
description = "dbxcarta retrieval runtime and Text2SQL evaluation harness"
authors = [
    { name = "Ryan Knight" },
]
requires-python = ">=3.12"
dependencies = [
    "databricks-sdk>=0.40",
    "dbxcarta-core",
    "neo4j>=5.0",
    "pydantic>=2",
    "pydantic-settings>=2",
    "requests",
]

[project.optional-dependencies]
test = ["pytest"]

[project.scripts]
dbxcarta-client = "dbxcarta.client.eval.entrypoint:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
dbxcarta-core = { workspace = true }

[tool.uv.build-backend]
module-name = "dbxcarta.client"
