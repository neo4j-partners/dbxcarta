name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GIT_PUSH_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Bump version
        run: |
          uv version --bump ${{ inputs.bump_type }} --frozen
          version=$(uv version --short)
          uv version --package dbxcarta-client "$version" --frozen
          uv version --package dbxcarta-spark "$version" --frozen
          uv version --package dbxcarta-dense-schema-example "$version" --frozen
          uv version --package dbxcarta-finance-genie-example "$version" --frozen
          uv version --package dbxcarta-schemapile-example "$version" --frozen
          uv lock
          uv lock --check

      - name: Get version
        id: get-version
        run: echo version=`uv version --short` >> "$GITHUB_OUTPUT"

      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          author_name: dbxcarta GitHub Action
          author_email: noreply@github.com
          message: Bump version to ${{ steps.get-version.outputs.version }}
          add: "pyproject.toml packages/*/pyproject.toml examples/*/pyproject.toml uv.lock"
          tag: ${{ steps.get-version.outputs.version }}
