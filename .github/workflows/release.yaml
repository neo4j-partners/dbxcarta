name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PUSH_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Bump version
        run: |
          uv version --bump ${{ inputs.bump_type }} --frozen
          version=$(uv version --short)
          uv version --package dbxcarta-client "$version" --frozen
          uv version --package dbxcarta-spark "$version" --frozen
          uv lock

      - name: Get version
        id: get-version
        run: echo version=`uv version --short` >> "$GITHUB_OUTPUT"

      - uses: EndBug/add-and-commit@v9
        with:
          author_name: dbxcarta GitHub Action
          author_email: noreply@github.com
          message: Bump version to ${{ steps.get-version.outputs.version }}
          add: "pyproject.toml packages/*/pyproject.toml uv.lock"
          tag: ${{ steps.get-version.outputs.version }}
