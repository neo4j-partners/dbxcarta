name: Publish Python distribution

on:
  push:
    tags:
      - "*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version

      - name: Build the self-contained dbxcarta-submit wheel
        # dbxcarta-submit is the only published distribution. It imports a subset
        # of dbxcarta.core and its release wheel declares no dbxcarta-core
        # dependency, so it must physically bundle those core modules. A plain
        # `uv build --package dbxcarta-submit` would NOT bundle them; the
        # dedicated script copies the curated subset in, builds, and verifies the
        # wheel carries dbxcarta/core. Wheel-only on purpose: an sdist could not
        # carry core, which lives in a sibling package. dbxcarta-core and
        # dbxcarta-client stay in the workspace but are not published; the ingest
        # pipeline moved to neocarta and ships as the neocarta connector wheel.
        # The wheel lands in dist/ and flows through the attest, upload, and
        # publish steps below.
        run: python scripts/build_submit_wheel.py

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/*.whl

      - name: Store distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dbxcarta-submit
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
