name: Supply Chain

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  layer-tests:
    name: Tests / ${{ matrix.layer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: core
            package: dbxcarta-spark
            tests: tests/core
          - layer: spark
            package: dbxcarta-spark
            extra_package: dbxcarta-client
            tests: tests/spark
          - layer: client
            package: dbxcarta-client
            tests: tests/client
          - layer: presets
            package: dbxcarta-spark
            tests: tests/presets
          - layer: boundary
            package: dbxcarta-spark
            extra_package: dbxcarta-client
            tests: tests/boundary
          - layer: finance-genie
            package: dbxcarta-finance-genie-example
            tests: tests/examples/finance-genie
          - layer: schemapile
            package: dbxcarta-schemapile-example
            tests: tests/examples/schemapile
          - layer: dense-schema
            package: dbxcarta-dense-schema-example
            tests: tests/examples/dense-schema
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up Java for PySpark tests
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Check lockfile
        run: uv lock --check

      - name: Sync package test environment
        run: |
          args="--package ${{ matrix.package }}"
          [[ -n "${{ matrix.extra_package }}" ]] && args="$args --package ${{ matrix.extra_package }}"
          uv sync --frozen $args --extra test --no-default-groups

      - name: Run layer tests
        run: uv run --no-sync pytest ${{ matrix.tests }}

  validate:
    name: Validate locked build
    runs-on: ubuntu-latest
    needs: layer-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up Java for PySpark tests
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Check lockfile
        run: uv lock --check

      - name: Sync frozen test environment
        run: uv sync --frozen --group test --all-packages

      - name: Run all tests
        run: uv run pytest

      - name: Clean package output
        run: rm -rf dist

      - name: Build packages
        run: uv build --all-packages

      - name: Inspect package artifacts
        run: uv run python scripts/security/artifact_audit.py inspect dist

      - name: Write artifact provenance
        run: >
          uv run python scripts/security/artifact_audit.py provenance dist
          --output dist/supply-chain-provenance.json

      - name: Upload package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/supply-chain-provenance.json
