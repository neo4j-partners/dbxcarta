name: Supply Chain

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  layer-tests:
    name: Tests / ${{ matrix.layer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: core
            package: dbxcarta-core
            tests: tests/core
          - layer: client
            package: dbxcarta-client
            extras: graph
            tests: tests/client
          - layer: submit
            package: dbxcarta-submit
            extra_package: dbxcarta-core
            tests: tests/submit
          - layer: boundary
            package: dbxcarta-client
            extra_package: dbxcarta-materialize
            tests: tests/boundary
          - layer: schemapile
            package: dbxcarta-schemapile-example
            tests: tests/examples/schemapile
          - layer: dense-schema
            package: dbxcarta-dense-schema-example
            tests: tests/examples/dense-schema
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version

      - name: Check lockfile
        run: uv lock --check

      - name: Sync package test environment
        run: |
          args="--package ${{ matrix.package }}"
          for extra_package in ${{ matrix.extra_package }}; do
            args="$args --package $extra_package"
          done
          [[ -n "${{ matrix.extras }}" ]] && args="$args --extra ${{ matrix.extras }}"
          uv sync --frozen $args --extra test --no-default-groups

      - name: Run layer tests
        run: uv run --no-sync pytest ${{ matrix.tests }}

  validate:
    name: Validate locked build
    runs-on: ubuntu-latest
    needs: layer-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: .python-version

      - name: Set up Java for materialize PySpark tests
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Check lockfile
        run: uv lock --check

      - name: Sync frozen test environment
        run: uv sync --frozen --group test --group ci --all-packages

      - name: Verify integration tests importable
        run: uv run pytest tests/integration --collect-only -q || [ $? -eq 5 ]

      - name: Run all tests
        run: uv run pytest

      - name: Type check
        run: uv run mypy -p dbxcarta.core -p dbxcarta.client -p dbxcarta.submit -p dbxcarta.materialize -p dbxcarta.spark

      - name: Lint
        run: uv run ruff check .

      - name: Vulnerability scan
        run: |
          uv export --frozen --all-packages --no-hashes -o /tmp/all-requirements.txt
          grep -v "^-e " /tmp/all-requirements.txt > /tmp/requirements.txt
          uv run pip-audit -r /tmp/requirements.txt

      - name: Clean package output
        run: rm -rf dist

      - name: Build packages
        run: uv build --all-packages

      - name: Generate SBOM
        run: |
          uv export --frozen --all-packages --no-hashes -o /tmp/all-requirements.txt
          grep -v "^-e " /tmp/all-requirements.txt > /tmp/sbom-requirements.txt
          uv run cyclonedx-py requirements /tmp/sbom-requirements.txt --output-file dist/sbom.cdx.json

      - name: Inspect package artifacts
        run: uv run python scripts/security/artifact_audit.py inspect dist

      - name: Write artifact provenance
        run: >
          uv run python scripts/security/artifact_audit.py provenance dist
          --output dist/supply-chain-provenance.json

      - name: Upload package evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-evidence
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.cdx.json
            dist/supply-chain-provenance.json
