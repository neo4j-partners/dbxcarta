[project]
name = "dbxcarta"
version = "0.2.15"
description = "Unity Catalog to Neo4j ingestion pipeline via Databricks Spark jobs"
authors = [
    { name = "Ryan Knight"}
]
requires-python = ">=3.12"
dependencies = [
    "databricks-job-runner>=0.4.7",
    "databricks-sdk>=0.40",
    "neo4j>=5.0",
    "pydantic>=2",
    "pydantic-settings>=2",
    "python-dotenv",
]

[project.scripts]
dbxcarta = "dbxcarta.cli:main"

[project.optional-dependencies]
test = [
    "pytest",
    "pyspark>=3.5",
]

[build-system]
requires = ["uv_build>=0.9.3,<0.10.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
markers = [
    "slow: tests that submit a Databricks job and wait for it to finish",
]

# Phase 3.5 (worklog/fk-gap-v3-build.md): mypy config declares the FK-inference
# surface as the first strictly-typed module in the package. Not executed here
# (this workstream ships no code execution); the evaluate workstream runs mypy.
[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = ["dbxcarta.fk_inference"]
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true
check_untyped_defs = true
warn_unused_ignores = true
strict_equality = true
