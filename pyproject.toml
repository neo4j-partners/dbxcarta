[project]
name = "dbxcarta"
version = "0.2.41"
description = "Unity Catalog to Neo4j ingestion pipeline via Databricks Spark jobs"
authors = [
    { name = "Ryan Knight"}
]
requires-python = ">=3.12"
dependencies = [
    "databricks-job-runner>=0.4.8",
    "databricks-sdk>=0.40",
    "neo4j>=5.0",
    "pydantic>=2",
    "pydantic-settings>=2",
    "python-dotenv",
]

[project.scripts]
dbxcarta = "dbxcarta.cli:main"
dbxcarta-client = "dbxcarta.entrypoints.client:main"
dbxcarta-ingest = "dbxcarta.entrypoints.ingest:main"

[project.optional-dependencies]
test = [
    "mypy",
    "pytest",
    "pyspark>=3.5",
    "types-requests",
]

[build-system]
requires = ["uv_build>=0.9.3,<0.10.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
addopts = "-m 'not live' --import-mode=importlib"
markers = [
    "live: tests that require a live Databricks profile, Neo4j, and a previously-loaded catalog (default pytest skips these)",
]

# Mypy-strict covers the ingestion domain layer: FK types, FK discovery,
# extract, settings, summary, and pipeline-edge I/O helpers.
[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = [
    "dbxcarta.contract",
    "dbxcarta.ingest.fk.common",
    "dbxcarta.ingest.fk.declared",
    "dbxcarta.ingest.fk.metadata",
    "dbxcarta.ingest.fk.semantic",
    "dbxcarta.ingest.extract",
    "dbxcarta.ingest.fk.discovery",
    "dbxcarta.settings",
    "dbxcarta.ingest.summary",
    "dbxcarta.ingest.transform.staging",
    "dbxcarta.ingest.transform.ledger",
    "dbxcarta.ingest.load.neo4j_io",
    "dbxcarta.ingest.preflight",
]
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true
check_untyped_defs = true
warn_unused_ignores = true
strict_equality = true
