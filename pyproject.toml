[project]
name = "dbxcarta"
version = "0.2.19"
description = "Unity Catalog to Neo4j ingestion pipeline via Databricks Spark jobs"
authors = [
    { name = "Ryan Knight"}
]
requires-python = ">=3.12"
dependencies = [
    "databricks-job-runner>=0.4.8",
    "databricks-sdk>=0.40",
    "neo4j>=5.0",
    "pydantic>=2",
    "pydantic-settings>=2",
    "python-dotenv",
]

[project.scripts]
dbxcarta = "dbxcarta.cli:main"

[project.optional-dependencies]
test = [
    "pytest",
    "pyspark>=3.5",
]

[build-system]
requires = ["uv_build>=0.9.3,<0.10.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
addopts = "-m 'not live'"
markers = [
    "live: tests that require a live Databricks profile, Neo4j, and a previously-loaded catalog (default pytest skips these)",
]

# Phase 3.5 / 3.6: mypy-strict covers the entire domain layer (FK types,
# inference, extract, settings, summary, and pipeline-edge I/O helpers).
# Not executed in this workstream (no code execution); the evaluate
# workstream runs mypy.
[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = [
    "dbxcarta.contract",
    "dbxcarta.fk_common",
    "dbxcarta.fk_declared",
    "dbxcarta.fk_metadata",
    "dbxcarta.fk_semantic",
    "dbxcarta.extract",
    "dbxcarta.fk_discovery",
    "dbxcarta.settings",
    "dbxcarta.summary",
    "dbxcarta.staging",
    "dbxcarta.ledger",
    "dbxcarta.neo4j_io",
    "dbxcarta.preflight",
]
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true
check_untyped_defs = true
warn_unused_ignores = true
strict_equality = true
